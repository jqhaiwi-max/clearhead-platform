openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: MindBridge psychiatric care platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: providers
    description: Psychiatrist/therapist provider operations
  - name: appointments
    description: Appointment booking operations
  - name: specialties
    description: Specialty/service operations
  - name: testimonials
    description: Patient testimonial operations
  - name: stats
    description: Platform statistics
  - name: ratings
    description: Session rating/feedback operations
  - name: admin
    description: Admin-only operations (requires bearer auth)
security: []
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /providers:
    get:
      operationId: listProviders
      tags: [providers]
      summary: List all providers
      parameters:
        - name: specialty
          in: query
          schema:
            type: string
        - name: available
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Provider"
    post:
      operationId: createProvider
      tags: [providers]
      summary: Create a new provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProviderInput"
      responses:
        "201":
          description: Created provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Provider"

  /providers/{id}:
    get:
      operationId: getProvider
      tags: [providers]
      summary: Get a provider by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Provider details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Provider"
        "404":
          description: Provider not found
    put:
      operationId: updateProvider
      tags: [providers]
      summary: Update a provider (admin only)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProviderInput"
      responses:
        "200":
          description: Updated provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Provider"
        "401":
          description: Missing or invalid bearer token
        "403":
          description: Admin access required
        "404":
          description: Provider not found
    delete:
      operationId: deleteProvider
      tags: [providers]
      summary: Delete a provider (admin only)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Provider deleted
        "401":
          description: Missing or invalid bearer token
        "403":
          description: Admin access required

  /appointments/slots:
    get:
      operationId: getBookedSlots
      tags: [appointments]
      summary: Get booked time slots for a provider on a given date
      parameters:
        - name: providerId
          in: query
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Booked slots
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookedSlots:
                    type: array
                    items:
                      type: string

  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments. Admins (bearer token) receive all appointments; unauthenticated callers must supply email and phone to look up their own appointments.
      security:
        - bearerAuth: []
        - {}
      parameters:
        - name: email
          in: query
          required: false
          schema:
            type: string
          description: Patient email, required for non-admin lookups
        - name: phone
          in: query
          required: false
          schema:
            type: string
          description: Patient phone, required for non-admin lookups
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
        "400":
          description: Missing email/phone for non-admin lookup
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Book a new appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentInput"
      responses:
        "201":
          description: Appointment booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /appointments/{id}:
    get:
      operationId: getAppointment
      tags: [appointments]
      summary: Get an appointment by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Appointment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update appointment status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentUpdate"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /specialties:
    get:
      operationId: listSpecialties
      tags: [specialties]
      summary: List all mental health specialties
      responses:
        "200":
          description: List of specialties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Specialty"

  /testimonials:
    get:
      operationId: listTestimonials
      tags: [testimonials]
      summary: List patient testimonials
      responses:
        "200":
          description: List of testimonials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Testimonial"
    post:
      operationId: createTestimonial
      tags: [testimonials]
      summary: Submit a new testimonial
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestimonialInput"
      responses:
        "201":
          description: Testimonial submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Testimonial"

  /stats/platform:
    get:
      operationId: getPlatformStats
      tags: [stats]
      summary: Get platform-level statistics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /providers/featured:
    get:
      operationId: getFeaturedProviders
      tags: [providers]
      summary: Get featured/top-rated providers
      responses:
        "200":
          description: Featured providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Provider"

  /ratings:
    post:
      operationId: createRating
      tags: [ratings]
      summary: Submit a session rating
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RatingInput"
      responses:
        "201":
          description: Rating created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rating"

  /ratings/provider/{providerId}:
    get:
      operationId: listProviderRatings
      tags: [ratings]
      summary: List ratings for a provider
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of ratings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rating"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard stats
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Admin stats
        "401":
          description: Missing or invalid bearer token
        "403":
          description: Admin access required

  /admin/payments:
    get:
      operationId: listAdminPayments
      tags: [admin]
      summary: List all payments
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
        "401":
          description: Missing or invalid bearer token
        "403":
          description: Admin access required
    post:
      operationId: createAdminPayment
      tags: [admin]
      summary: Record a new payment
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Payment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "401":
          description: Missing or invalid bearer token
        "403":
          description: Admin access required

  /admin/payments/{id}:
    patch:
      operationId: updateAdminPayment
      tags: [admin]
      summary: Update a payment's status/reference/notes
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentStatusUpdate"
      responses:
        "200":
          description: Updated payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "401":
          description: Missing or invalid bearer token
        "403":
          description: Admin access required
        "404":
          description: Payment not found
    delete:
      operationId: deleteAdminPayment
      tags: [admin]
      summary: Delete a payment
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment deleted
        "401":
          description: Missing or invalid bearer token
        "403":
          description: Admin access required

  /admin/appointments/bulk:
    patch:
      operationId: bulkUpdateAppointments
      tags: [admin]
      summary: Bulk-update appointment status (e.g. approve multiple)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentBulkUpdate"
      responses:
        "200":
          description: Appointments updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
                  appointments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Appointment"
        "401":
          description: Missing or invalid bearer token
        "403":
          description: Admin access required

  /admin/ratings:
    get:
      operationId: listAdminRatings
      tags: [admin]
      summary: List most recent ratings (admin view)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of ratings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rating"
        "401":
          description: Missing or invalid bearer token
        "403":
          description: Admin access required

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase-issued JWT access token; caller's email must be in the server's admin allowlist.
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Provider:
      type: object
      required: [id, name, title, specialty, bio, rating, reviewCount, yearsExperience, imageUrl, available, sessionPrice]
      properties:
        id:
          type: integer
        name:
          type: string
        title:
          type: string
        specialty:
          type: string
        bio:
          type: string
        rating:
          type: number
        reviewCount:
          type: integer
        yearsExperience:
          type: integer
        imageUrl:
          type: string
        available:
          type: boolean
        sessionPrice:
          type: integer
        languages:
          type: ["array", "null"]
          items:
            type: string
        acceptsInsurance:
          type: boolean
        nextAvailable:
          type: ["string", "null"]

    ProviderInput:
      type: object
      required: [name, title, specialty, bio, yearsExperience, imageUrl, sessionPrice]
      properties:
        name:
          type: string
        title:
          type: string
        specialty:
          type: string
        bio:
          type: string
        yearsExperience:
          type: integer
        imageUrl:
          type: string
        sessionPrice:
          type: integer
        languages:
          type: array
          items:
            type: string
        acceptsInsurance:
          type: boolean

    Appointment:
      type: object
      required: [id, patientName, patientEmail, providerId, providerName, date, time, type, status, createdAt]
      properties:
        id:
          type: integer
        patientName:
          type: string
        patientEmail:
          type: string
        providerId:
          type: integer
        providerName:
          type: string
        date:
          type: string
        time:
          type: string
        type:
          type: string
        status:
          type: string
        notes:
          type: ["string", "null"]
        patientPhone:
          type: ["string", "null"]
        paymentMethod:
          type: ["string", "null"]
        careType:
          type: ["string", "null"]
        diagnosisSummary:
          type: ["string", "null"]
        approvedAt:
          type: ["string", "null"]
        approvedBy:
          type: ["string", "null"]
        createdAt:
          type: string

    AppointmentInput:
      type: object
      required: [patientName, patientEmail, providerId, date, time, type]
      properties:
        patientName:
          type: string
        patientEmail:
          type: string
        providerId:
          type: integer
        date:
          type: string
        time:
          type: string
        type:
          type: string
        notes:
          type: string
        patientPhone:
          type: string
        paymentMethod:
          type: string
        careType:
          type: string
        diagnosisSummary:
          type: string

    AppointmentUpdate:
      type: object
      properties:
        status:
          type: string
        notes:
          type: string
        approvedBy:
          type: string

    Specialty:
      type: object
      required: [id, name, description, iconName, providerCount]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        iconName:
          type: string
        providerCount:
          type: integer

    Testimonial:
      type: object
      required: [id, patientName, content, rating, condition, createdAt]
      properties:
        id:
          type: integer
        patientName:
          type: string
        content:
          type: string
        rating:
          type: integer
        condition:
          type: string
        createdAt:
          type: string
        avatarInitials:
          type: string

    TestimonialInput:
      type: object
      required: [patientName, content, rating, condition]
      properties:
        patientName:
          type: string
        content:
          type: string
        rating:
          type: integer
        condition:
          type: string

    PlatformStats:
      type: object
      required: [totalProviders, totalPatients, totalSessions, avgRating, countriesServed, satisfactionRate]
      properties:
        totalProviders:
          type: integer
        totalPatients:
          type: integer
        totalSessions:
          type: integer
        avgRating:
          type: number
        countriesServed:
          type: integer
        satisfactionRate:
          type: number

    Payment:
      type: object
      required: [id, patientName, providerName, amount, currency, method, status, createdAt]
      properties:
        id:
          type: integer
        appointmentId:
          type: ["integer", "null"]
        patientName:
          type: string
        patientPhone:
          type: ["string", "null"]
        patientEmail:
          type: ["string", "null"]
        providerName:
          type: string
        providerId:
          type: ["integer", "null"]
        amount:
          type: integer
        currency:
          type: string
        method:
          type: string
        status:
          type: string
        reference:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    PaymentInput:
      type: object
      required: [patientName, providerName, amount]
      properties:
        patientName:
          type: string
        patientPhone:
          type: string
        patientEmail:
          type: string
        providerName:
          type: string
        providerId:
          type: integer
        appointmentId:
          type: integer
        amount:
          type: integer
        currency:
          type: string
        method:
          type: string
        status:
          type: string
        reference:
          type: string
        notes:
          type: string

    Rating:
      type: object
      required: [id, providerId, patientName, rating, sessionDate, createdAt]
      properties:
        id:
          type: integer
        appointmentId:
          type: ["integer", "null"]
        providerId:
          type: integer
        patientName:
          type: string
        rating:
          type: integer
        mood:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        sessionDate:
          type: string
        createdAt:
          type: string

    RatingInput:
      type: object
      required: [providerId, patientName, rating, sessionDate]
      properties:
        appointmentId:
          type: integer
        providerId:
          type: integer
        patientName:
          type: string
        rating:
          type: integer
        mood:
          type: string
        notes:
          type: string
        sessionDate:
          type: string

    PaymentStatusUpdate:
      type: object
      properties:
        status:
          type: string
        reference:
          type: string
        notes:
          type: string

    AppointmentBulkUpdate:
      type: object
      required: [ids, status]
      properties:
        ids:
          type: array
          items:
            type: integer
        status:
          type: string
          enum: [pending, confirmed, cancelled, completed]
